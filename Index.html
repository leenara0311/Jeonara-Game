<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SK하이닉스 버티기</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: #f0f0f0;
    color: #1c1917;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    display: flex;
    justify-content: center;
    padding: 6px 9px;
  }
  .card {
    width: 100%; max-width: 600px;
    background: #ffffff;
    border: 1px solid #e2e8f0;
    border-radius: 14px;
    padding: 10px 14px;
    position: relative;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
  }
  .header { display: flex; align-items: center; gap: 10px; margin-bottom: 2px; }
  .logo { width: 34px; height: 34px; border-radius: 8px; background: #0d9488; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  h1 { font-size: 16px; font-weight: 600; color: #111827; }
  .sub { font-size: 11px; color: #6b7280; margin-top: 1px; }
  .prologue { font-size: 11px; color: #6b7280; font-style: italic; border-left: 2px solid #d1d5db; padding-left: 10px; margin: 5px 0 6px; line-height: 1.4; }
  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 4px; }
  .stat { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px; padding: 6px 9px; }
  .stat .lbl { font-size: 11px; color: #6b7280; margin-bottom: 2px; }
  .stat .val { font-size: 16px; font-weight: 600; font-family: ui-monospace, monospace; color: #111827; }
  .bar-wrap { margin-bottom: 4px; }
  .bar-labels { display: flex; justify-content: space-between; font-size: 10px; color: #9ca3af; margin-bottom: 2px; }
  .bar-track { height: 5px; background: #e5e7eb; border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; transition: width .15s linear, background .3s; }
  .era { display: flex; gap: 7px; border: 1px dashed #d97706; border-radius: 8px; padding: 5px 9px; margin: 5px 0; background: #fffbeb; }
  .era-yr { font-size: 10px; color: #b45309; display: block; margin-bottom: 1px; }
  .era p { font-size: 11px; font-style: italic; color: #44403c; line-height: 1.35; }
  @keyframes eraflash { 0%{background:#fef08a} 40%{background:#fef08a} 100%{background:#fffbeb} }
  .era.flash { animation: eraflash .7s ease-out; }
  .speed-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 5px; align-items: center; }
  .spd { font-size: 11px; padding: 4px 9px; border-radius: 6px; border: 1px solid #d1d5db; background: #fff; color: #6b7280; cursor: pointer; }
  .spd.on { border-color: #0d9488; color: #0d9488; background: #f0fdfa; }
  .charzone { display: flex; flex-direction: column; align-items: center; gap: 2px; margin-bottom: 5px; }
  .char-bob { animation: bob 1.4s ease-in-out infinite; }
  @keyframes bob { 0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)} }
  .scene-box { display: none; align-items: center; background: #f3f4f6; border-radius: 999px; padding: 4px 12px; font-size: 11px; color: #374151; max-width: 92%; }
  .scene-box.show { display: inline-flex; animation: pop .3s ease; }
  @keyframes pop { from{opacity:0;transform:translateY(4px) scale(.96)} to{opacity:1;transform:translateY(0) scale(1)} }
  @keyframes tearfall { 0%{transform:translateY(0);opacity:1} 70%{opacity:.8} 100%{transform:translateY(16px);opacity:0} }
  .tear-a  { animation: tearfall .85s ease-in infinite; }
  .tear-b  { animation: tearfall .85s ease-in .12s infinite; }
  .tear-a2 { animation: tearfall .85s ease-in .42s infinite; }
  .tear-b2 { animation: tearfall .85s ease-in .55s infinite; }
  .suit-lbl { font-size: 10px; color: #9ca3af; }
  #endureBtn {
    width: 100%; max-width: 280px; display: block; margin: 0 auto 5px;
    padding: 8px; border: none; border-radius: 10px;
    background: #f59e0b; color: #1c1917; font-weight: 700; font-size: 14px; cursor: pointer;
  }
  #endureBtn:disabled { background: #e5e7eb; color: #9ca3af; cursor: default; }
  .footnote { font-size: 10px; color: #9ca3af; text-align: center; margin-top: 5px; line-height: 1.4; }
  .overlay { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.45); border-radius: 14px; align-items: center; justify-content: center; padding: 16px; }
  .overlay.show { display: flex; }
  .modal { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 20px; max-width: 340px; width: 100%; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.12); }
  .modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 4px; color: #111827; }
  .modal p { font-size: 12px; color: #6b7280; line-height: 1.55; margin-bottom: 14px; }
  .modal-actions { display: flex; gap: 8px; }
  .modal button { flex: 1; padding: 9px; border-radius: 8px; border: 1px solid #d1d5db; background: #fff; color: #374151; font-size: 13px; cursor: pointer; }
  .modal button.quit { border-color: #f87171; color: #ef4444; }
  .modal button.stay { border-color: #34d399; color: #059669; }
</style>
</head>

  <button id="endureBtn">버티기 <span style="font-weight:500;font-size:12px;opacity:.8;">(클릭클릭!)</span></button>

  <p class="footnote">풍자 게임입니다. 실제 번아웃 직전까지 버티지 마세요 — 건강이 성과급보다 먼저입니다.</p>

  <div class="overlay" id="overlay">
    <div class="modal">
      <h2 id="modalTitle"></h2>
      <p id="modalBody"></p>
      <div class="modal-actions" id="modalActions"></div>
    </div>
  </div>
</div>

/* ── 나이에 따른 외모 파라미터 ── */
function agingParams(a){
  var t=Math.min(1,Math.max(0,(a-27)/26)); /* 0(27세) → 1(53세) */
  var hairColors=['#3f3f46','#55556a','#78788a','#9ca3af','#b8bfc8','#d1d5db'];
  var hairIdx=Math.min(5,Math.floor((a-27)/5));
  return {
    hairCol: hairColors[hairIdx],
    wrinkle1: a>=37,
    wrinkle2: a>=44,
    stoop: a>=47 ? 10 : a>=42 ? 5 : 0
  };
}

function charSVG(stress, suitOn, action){
  var a=age();
  var ap=agingParams(a);
  var expr=stress>=80?'stressed':stress>=50?'tense':'calm';
  var suitCol='#e0f2fe', shirtCol='#475569';
  var hairCol=suitOn?suitCol:ap.hairCol;

  /* mouth — 2/3 크기, 얼굴 안 위치 */
  var mouth;
  if(action==='cry') mouth='M42,51 Q50,45 58,51';
  else if(expr==='calm') mouth='M42,48 Q50,54 58,48';
  else if(expr==='tense') mouth='M42,50 L58,50';
  else mouth='M42,52 Q50,47 58,52';

  /* eyebrows */
  var bL=expr==='stressed'?18:expr==='tense'?8:0;
  var bR=expr==='stressed'?-18:expr==='tense'?-8:0;

  /* body */
  var torso=suitOn
    ?'<rect x="26" y="60" width="48" height="56" rx="16" fill="'+suitCol+'"/>'
     +'<line x1="50" y1="62" x2="50" y2="112" stroke="#94a3b8" stroke-width="1.5"/>'
     +'<rect x="42" y="78" width="16" height="10" rx="2" fill="#2dd4bf"/>'
    :'<rect x="26" y="60" width="48" height="56" rx="16" fill="'+shirtCol+'"/>'
     +'<path d="M42,60 L50,70 L58,60 Z" fill="#f0b27a"/>';
  var hood=suitOn
    ?'<ellipse cx="50" cy="20" rx="23" ry="11" fill="'+suitCol+'"/>'
    :'<ellipse cx="50" cy="22" rx="19" ry="9" fill="'+hairCol+'"/>';

  /* stress sweat */
  var sweat=expr==='stressed'?'<path d="M68,28 Q71,33 68,36 Q65,33 68,28 Z" fill="#38bdf8"/>':'';

  /* wrinkle lines */
  var wk='';
  if(ap.wrinkle1){
    wk+='<line x1="37" y1="33" x2="34" y2="35" stroke="#c4a882" stroke-width="0.9" opacity="0.55"/>'
       +'<line x1="63" y1="33" x2="66" y2="35" stroke="#c4a882" stroke-width="0.9" opacity="0.55"/>';
  }
  if(ap.wrinkle2){
    wk+='<line x1="36" y1="44" x2="40" y2="45" stroke="#c4a882" stroke-width="0.8" opacity="0.45"/>'
       +'<line x1="60" y1="44" x2="64" y2="45" stroke="#c4a882" stroke-width="0.8" opacity="0.45"/>'
       +'<path d="M44,48 Q50,50 56,48" stroke="#c4a882" stroke-width="0.7" fill="none" opacity="0.4"/>';
  }

  /* head tilt */
  var headTilt=ap.stoop;
  if(action==='headdown') headTilt=Math.max(headTilt,20);

  /* prop & arm overrides */
  var prop='';
  var armLSVG='<rect x="14" y="62" width="13" height="28" rx="6" fill="'+(suitOn?suitCol:shirtCol)+'"/>';
  var armRSVG='<rect x="73" y="62" width="13" height="28" rx="6" fill="'+(suitOn?suitCol:shirtCol)+'"/>';

  if(action==='drink'){
    /* 오른팔을 올려서 손이 맥주캔 위치에 오도록 */
    armRSVG='<rect x="74" y="44" width="12" height="26" rx="6" fill="'+(suitOn?suitCol:shirtCol)+'"/>';
    prop='<rect x="74" y="28" width="10" height="17" rx="3" fill="#fde68a" stroke="#d97706" stroke-width="1.2"/>'
        +'<line x1="76" y1="28" x2="82" y2="28" stroke="#d97706" stroke-width="1.2"/>'
        +'<rect x="76" y="30" width="6" height="5" rx="1" fill="#f59e0b" opacity="0.6"/>';
  } else if(action==='cry'){
    prop='<ellipse class="tear-a" cx="42" cy="42" rx="2" ry="4.5" fill="#60a5fa" opacity="0.9"/>'
        +'<ellipse class="tear-b" cx="58" cy="42" rx="2" ry="4.5" fill="#60a5fa" opacity="0.9"/>'
        +'<ellipse class="tear-a2" cx="42" cy="50" rx="1.5" ry="3.5" fill="#93c5fd" opacity="0.7"/>'
        +'<ellipse class="tear-b2" cx="58" cy="50" rx="1.5" ry="3.5" fill="#93c5fd" opacity="0.7"/>';
  } else if(action==='photo'){
    /* 왼팔을 올려서 손이 가족사진 위치에 오도록 */
    armLSVG='<rect x="14" y="44" width="12" height="26" rx="6" fill="'+(suitOn?suitCol:shirtCol)+'"/>';
    prop='<rect x="14" y="22" width="22" height="22" rx="2" fill="#fff" stroke="#94a3b8" stroke-width="1.5"/>'
        +'<rect x="16" y="24" width="18" height="18" rx="1" fill="#fde68a" opacity="0.5"/>'
        +'<circle cx="25" cy="33" r="4" fill="#f87171" opacity="0.55"/>'
        +'<circle cx="33" cy="30" r="2.5" fill="#34d399" opacity="0.55"/>';
  }

  /* body extras */
  var bodyExtras='';

  return '<svg viewBox="0 0 100 140" width="74" height="104">'
    + armLSVG + armRSVG
    + torso + bodyExtras
    +'<rect x="44" y="50" width="12" height="14" fill="#f0b27a"/>'
    +'<g transform="rotate('+headTilt+' 50 36)">'
    +'<circle cx="50" cy="36" r="20" fill="#f0b27a"/>'
    + hood + wk
    +'<rect x="37" y="27" width="10" height="2.5" rx="1.2" fill="#4b3621" transform="rotate('+bL+' 42 28.25)"/>'
    +'<rect x="53" y="27" width="10" height="2.5" rx="1.2" fill="#4b3621" transform="rotate('+bR+' 58 28.25)"/>'
    +'<circle cx="42" cy="36" r="4" fill="#fff"/><circle cx="42" cy="37" r="2" fill="#1f2937"/>'
    +'<circle cx="58" cy="36" r="4" fill="#fff"/><circle cx="58" cy="37" r="2" fill="#1f2937"/>'
    +'<path d="M50,38 L47,45 L53,45 Z" fill="#d99a66"/>'
    +'<path d="'+mouth+'" stroke="#7c4a2d" stroke-width="2" fill="none" stroke-linecap="round"/>'
    + sweat
    +'</g>'
    + prop
    +'</svg>';
}

function render(){
  var y=Y[idx];
  $('badgeNo').textContent='사원증 No. '+String(idx+1).padStart(4,'0')+' · '+age()+'세';
  $('yearLabel').textContent=(idx+1)+'년차';
  $('yearSub').textContent=y.y+'년';
  var eraEl=document.querySelector('.era');
  if($('eraYr').textContent !== '사내소식 · '+y.y){
    eraEl.classList.remove('flash');
    void eraEl.offsetWidth;
    eraEl.classList.add('flash');
  }
  $('eraYr').textContent='사내소식 · '+y.y;
  $('eraText').textContent=y.t;
  var sv=Math.min(100,Math.round(stress));
  $('stressVal').textContent=sv+'%';
  $('stressVal').style.color=stressTxt(stress);
  $('stressPct').textContent=sv+'%';
  $('stressFill').style.width=sv+'%';
  $('stressFill').style.background=stressHex(stress);
  $('bonusVal').textContent=formatBonus(bonus);
  $('endureVal').textContent=endure;
  $('yearFill').style.width=Math.min(100,Math.round(prog))+'%';
  $('yearProgPct').textContent=Math.min(100,Math.round(prog))+'%';
  var suitOn=endure%2===0;
  $('charBox').innerHTML=charSVG(stress,suitOn,currentAction);
  $('suitLbl').textContent=suitOn?'방진복 착용 중 ('+(age())+'세)':'사복 근무 중 ('+(age())+'세)';
  $('endureBtn').disabled=paused;
}

function showModal(title,body,actions){
  $('modalTitle').textContent=title;
  $('modalBody').textContent=body;
  var box=$('modalActions'); box.innerHTML='';
  actions.forEach(function(a){
    var b=document.createElement('button');
    b.textContent=a.label;
    if(a.cls)b.className=a.cls;
    b.addEventListener('click',a.fn);
    box.appendChild(b);
  });
  $('overlay').classList.add('show');
}
function hideModal(){ $('overlay').classList.remove('show'); }

function showDecision(y){
  showModal(
    (idx+1)+'년차 ('+y.y+'년)',
    '퇴사하시겠습니까? 버티시겠습니까?',
    [
      {label:'퇴사한다',cls:'quit',fn:function(){hideModal();showEnding('quit');}},
      {label:'버틴다',cls:'stay',fn:function(){
        hideModal();
        stress=Math.max(0,stress-20);
        if(idx===Y.length-1){paused=true;showEnding('survive');return;}
        idx++;prog=0;paused=false;
        render();
      }}
    ]
  );
}

function showEnding(kind){
  paused=true;
  var y=Y[idx],title,body;
  if(kind==='burnout'){
    title='번아웃 퇴사';
    body=y.y+'년, 스트레스가 한계를 넘어 결국 자리를 떠났다. 누적 성과급 '+formatBonus(bonus)+'. 버티는 것도 건강이 먼저다.';
  } else if(kind==='quit'){
    var next=Y[idx+1];
    var irony=next&&next.b>=200?' 공교롭게도 다음 해부터 성과급이 크게 늘었다는 소식이 들려온다.':'';
    title='자발적 퇴사';
    body=y.y+'년, '+(idx+1)+'년차에 사직서를 던졌다. 누적 성과급 '+formatBonus(bonus)+'을 남기고 떠난다.'+irony;
  } else {
    title='완주 🎉';
    body=(idx+1)+'년을 버텨낸 끝에 '+y.y+'년, 사상 최고치의 호황 속에서 누적 성과급 '+formatBonus(bonus)+'을 손에 넣었다. 최종 등급: '+rankFor(bonus);
  }
  showModal(title,body,[{label:'다시 시작',fn:resetGame}]);
  render();
}

function finishYear(){
  var y=Y[idx];
  bonus+=y.b;
  stress=Math.max(0,stress-15);
  render();
  if(y.d){paused=true;showDecision(y);return;}
  if(idx===Y.length-1){showEnding('survive');return;}
  idx++;prog=0;
  render();
}

function tick(){
  if(paused)return;
  var y=Y[idx],totalMs=speeds[speedIdx];
  prog+=(TICK/totalMs)*100;
  stress+=y.s*0.6*(TICK/totalMs);
  if(Math.random()<0.01+(y.s/100)*0.02){
    stress+=8*0.6;
    var msg=NIGHT[Math.floor(Math.random()*NIGHT.length)];
    var box=$('sceneBox');
    box.className='scene-box';
    void box.offsetWidth;
    box.textContent=msg;
    box.className='scene-box show';
  }
  if(stress>=100){stress=100;render();showEnding('burnout');return;}
  if(prog>=100){prog=100;finishYear();return;}
  render();
}

function resetGame(){
  idx=0;prog=0;stress=20;endure=0;bonus=0;paused=false;
  clearTimeout(actionTimer); currentAction=null;
  hideModal();
  $('sceneBox').className='scene-box';
  render();
}

document.querySelectorAll('.spd').forEach(function(b){
  b.addEventListener('click',function(){
    speedIdx=Number(this.dataset.i);
    document.querySelectorAll('.spd').forEach(function(x){x.classList.remove('on');});
    this.classList.add('on');
  });
});

$('endureBtn').addEventListener('click',function(){
  if(paused)return;
  stress=Math.max(0,stress-7);
  endure++;
  var opts=COPING[bracket(age())];
  var pick=opts[Math.floor(Math.random()*opts.length)];
  clearTimeout(actionTimer);
  currentAction=pick.a;
  render();
  if(currentAction){
    actionTimer=setTimeout(function(){currentAction=null;render();},1800);
  }
  var box=$('sceneBox');
  box.className='scene-box';
  void box.offsetWidth;
  box.textContent=pick.t;
  box.className='scene-box show';
});

render();
setInterval(tick,TICK);
})();
</script>
</body>
</html>
